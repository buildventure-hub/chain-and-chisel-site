<style>
    /* Responsive form sizing */
    .content-card {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    form input,
    form textarea {
      width: 100% !important;
      box-sizing: border-box;
    }
  
    /* ============================= */
    /* ORDER PAGE HOTFIX (ALIGN + BUTTON) */
    /* ============================= */

    /* Never stretch checkboxes/radios */
    form input[type="checkbox"],
    form input[type="radio"]{
      width: auto !important;
      inline-size: auto !important;
      flex: 0 0 auto !important;
      max-width: none !important;
    }

    /* Keep stump checkbox lines INSIDE form and next to boxes */
    .stump-options{
      display: flex !important;
      flex-direction: column !important;
      gap: 10px !important;
      margin: 6px 0 18px !important;
      max-width: 100% !important;
    }
    .stump-options label{
      display: flex !important;
      align-items: center !important;
      justify-content: flex-start !important;
      gap: 10px !important;
      width: 100% !important;
      max-width: 100% !important;
      overflow: hidden !important;
    }
    .stump-options label span{
      flex: 1 1 auto !important;
      max-width: 100% !important;
      white-space: normal !important;
      word-break: normal !important;
      overflow-wrap: anywhere !important;
      line-height: 1.25 !important;
    }

    /* Submit plank: 30% smaller than the 320px baseline */
    .submit-plank{
      max-width: 224px !important;
      width: 100% !important;
      margin: 18px auto 0 !important;
      border: 0 !important;
      background: transparent !important;
      padding: 0 !important;
      cursor: pointer !important;
      display: block !important;
      position: relative !important;
    }

    /* Force the plank image to render (prevents "plain gray button" look) */
    .submit-plank .side-plank-img{
      display: block !important;
      width: 100% !important;
      height: auto !important;
      opacity: 1 !important;
      filter: none !important;
    }

    /* Center the text over the plank even if global styles fail */
    .submit-plank .side-plank-text{
      position: absolute !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      font-weight: 800 !important;
      color: #111 !important;
      text-shadow: none !important;
      pointer-events: none !important;
      text-align: center !important;
      white-space: nowrap !important;
    }

    /* Disabled state: slight dim, not washed out */
    .submit-plank[disabled],
    .submit-plank[aria-disabled="true"]{
      opacity: 0.92 !important;
      cursor: not-allowed !important;
    }

</style>

<h1 class="section-title">Contact</h1>
<div class="content-card">
<p>
        Use this form to submit a request, leave a review, or share a comment. After the quick “Are you human” check, the Email button will unlock.
      </p>
<p style="opacity:0.85;">
      </p>
<form id="orderForm" onsubmit="return false;">
<h3 style="margin-top:0;">Contact</h3>
<label for="firstName">First name</label><br/>
<input autocomplete="given-name" id="firstName" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="lastName">Last name</label><br/>
<input autocomplete="family-name" id="lastName" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="email">Email</label><br/>
<input autocomplete="email" id="email" placeholder="you@example.com" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="email"/><br/><br/>
<label for="phone">Phone</label><br/>
<input autocomplete="tel" id="phone" placeholder="(###) ###-####" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="tel"/><br/><br/>
<h3>Address</h3>
<label for="street">Street address</label><br/>
<input autocomplete="street-address" id="street" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="city">City</label><br/>
<input autocomplete="address-level2" id="city" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="zip">ZIP</label><br/>
<input autocomplete="postal-code" id="zip" inputmode="numeric" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<h3>Tree / Material</h3>
<label for="species">Tree species you would like carved</label><br/>
<input id="species" placeholder="e.g., pine, cottonwood, aspen…" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="circumference">Trunk circumference</label><br/>
<input id="circumference" placeholder="e.g., 48 in (or 122 cm)" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<div class="stump-options">
<label>
<input id="treeDry" name="treeCondition" type="radio" value="Dry (sitting for years)" style="width:auto!important;"/>
<span>Tree is dry (sitting for years)</span>
</label>
<label>
<input id="treeGreen" name="treeCondition" type="radio" value="Green (freshly cut)"/>
<span>Tree is green (freshly cut)</span>
</label>
</div>
<h3>Project description</h3>
<label for="description">Description</label><br/>
<textarea id="description" placeholder="Tell us what you want carved, size, style, deadline, budget range, delivery needs, photos/links, etc." rows="7" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;"></textarea><br/><br/>
<!-- Turnstile widget -->
<div class="cf-turnstile" data-callback="onHuman" data-sitekey="0x4AAAAAACjp72zfI1VMydXX"></div>
<br/>
<button aria-disabled="true" class="side-plank submit-plank" disabled="" id="submitBtn" type="button"><img alt="" class="side-plank-img" src="assets/buttons/plank-button-1.png?v=3"/><span class="side-plank-text">Submit Request</span></button>
<p id="formStatus" style="opacity:0.9; margin-top:10px;"></p>
<p style="opacity:0.8; margin-top:10px;">
        </p>
</form>
</div>
<script>
  let turnstileToken = "";

  const baseStyle = "width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;";
  const errStyle  = "width:100%; padding:10px; border-radius:10px; border:2px solid #ff6b6b; background:rgba(80,0,0,0.25); color:#fff;";

  function markField(id, isError){
    const el = document.getElementById(id);
    if(el) el.style.cssText = isError ? errStyle : baseStyle;
  }

  function setStatus(msg, isError=false){
    const el = document.getElementById('formStatus');
    if(!el) return;
    el.textContent = msg;
    el.style.color = isError ? "#ff6b6b" : "#cfe8cf";
  }

  function onHuman(token){
    turnstileToken = token || "";
    const btn = document.getElementById('submitBtn');
    if(btn) btn.disabled = !turnstileToken;
    if(turnstileToken) setStatus("Verified! You can send your request now.");
  }

  async function submitRequest(){
    const fields = ['firstName','lastName','email','phone','description'];
    fields.forEach(id => markField(id, false));

    const btn = document.getElementById('submitBtn');
    if(!turnstileToken){ setStatus("Please complete the 'I am human' check first.", true); return; }

    const v = id => document.getElementById(id)?.value.trim() || "";
    const firstName    = v('firstName');
    const lastName     = v('lastName');
    const email        = v('email');
    const phone        = v('phone');
    const street       = v('street');
    const city         = v('city');
    const zip          = v('zip');
    const species      = v('species');
    const circumference= v('circumference');
    const description  = v('description');

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    const errors = [];
    if(!firstName){ markField('firstName', true); errors.push("First name"); }
    if(!lastName) { markField('lastName',  true); errors.push("Last name");  }
    if(!email)    { markField('email',     true); errors.push("Email");      }
    else if(!emailOk){ markField('email',  true); errors.push("Valid email address"); }
    if(!phone)    { markField('phone',     true); errors.push("Phone");      }
    if(!description){ markField('description', true); errors.push("Project description"); }
    if(errors.length){ setStatus("Please fix: " + errors.join(", ") + ".", true); return; }

    if(btn) btn.disabled = true;
    setStatus("Sending…");

    const selectedCondition = document.querySelector('input[name="treeCondition"]:checked');
    const condition = selectedCondition ? selectedCondition.value : "Not specified";

    const templateParams = {
        from_name:      firstName + " " + lastName,
        from_email:     email,
        phone:          phone,
        street:         street  || "Not provided",
        city:           city    || "Not provided",
        zip:            zip     || "Not provided",
        species:        species || "Not provided",
        circumference:  circumference || "Not provided",
        condition:      condition,
        message:        description
      };

    // --- Send via Cloudflare Worker (Resend emails + Airtable CRM) ---
    try{
      console.log("[send] Submitting to /api/send…");
      const res  = await fetch("https://chainandchisel.art/api/send", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(templateParams),
      });
      const data = await res.json().catch(() => ({}));
      console.log("[send] Response:", data);

      if(res.ok && data.ok){
        setStatus("Sent! We'll get back to you soon.");
      }else{
        console.error("[send] Worker error:", data.errors);
        setStatus("Failed to send. Please email us directly at info@chainandchisel.art", true);
        if(btn) btn.disabled = false;
      }
    }catch(err){
      console.error("[send] Fetch exception:", err);
      setStatus("Failed to send. Please email us directly at info@chainandchisel.art", true);
      if(btn) btn.disabled = false;
    }
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    const btn = document.getElementById('submitBtn');
    if(btn) btn.addEventListener("click", submitRequest);
    ['firstName','lastName','email','phone','description'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => markField(id, false));
    });
  });
</script>
</main>

</main>
