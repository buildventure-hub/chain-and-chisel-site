<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Request | Chain &amp; Chisel</title>
<link href="styles.css" rel="stylesheet"/>
<!-- Site config must load first (synchronous) -->
<script src="site-config.js"></script>
<!-- Turnstile script is loaded conditionally by the form script below -->
<style>
    /* Responsive form sizing */
    .content-card {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Make text inputs fill the form, but DO NOT stretch checkboxes/radios */
    form input[type="text"],
    form input[type="email"],
    form input[type="tel"],
    form input[type="number"],
    form input[type="url"],
    form textarea,
    form select {
      width: 100% !important;
      box-sizing: border-box;
    }

    form input[type="checkbox"],
    form input[type="radio"]{
      width: auto !important;
    }

    /* Keep checkbox lines inside the form and aligned */
    .stump-options{
      display: grid;
      gap: 10px;
      margin: 6px 0 18px;
    }
    .stump-options label{
      display: flex;
      gap: 10px;
      align-items: flex-start;
      max-width: 100%;
    }
    .stump-options label span{
      display: inline-block;
      line-height: 1.25;
    }

    /* Plank submit button sizing */
    .submit-plank{
      max-width: 360px;
      margin: 10px auto 0;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .submit-plank[disabled],
    .submit-plank[aria-disabled="true"]{
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(25%);
    }
</style>
</head>
<body>
<div class="app">
<aside aria-label="Site navigation" class="sidebar" id="siteSidebar">
<div class="sidebar-inner" id="sidebarInner">
<div class="sidebar-logo" id="sidebarLogo">
<img alt="Chain &amp; Chisel Logo" src="assets/brand/chain-and-chisel-logo.png?v=1"/>
</div>
<nav aria-label="Primary" class="sidebar-nav" id="sidebarNav">
<a class="side-plank" href="index.html#gallery">
<img alt="" class="side-plank-img" src="assets/buttons/plank-button-1.png?v=3"/>
<span class="side-plank-text">Gallery</span>
</a>
<a class="side-plank" href="faq.html">
<img alt="" class="side-plank-img" src="assets/buttons/plank-button-2.png?v=3"/>
<span class="side-plank-text">FAQ</span>
</a>
<a class="side-plank" href="about.html">
<img alt="" class="side-plank-img" src="assets/buttons/plank-button-3.png?v=3"/>
<span class="side-plank-text">About</span>
</a> </nav>
</div>
</aside>
<main class="content" id="siteContent">
<div class="content-inner">
<main class="page">
<h1 class="section-title">Order Request</h1>
<div class="content-card">
<p id=”formInstructions”>
        Fill out the request details below. After you pass the “Are you human” check, the Email button will unlock.
      </p>
<form id="orderForm" onsubmit="return false;">
<h3 style="margin-top:0;">Contact</h3>
<label for="firstName">First name</label><br/>
<input autocomplete="given-name" id="firstName" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="lastName">Last name</label><br/>
<input autocomplete="family-name" id="lastName" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="phone">Phone</label><br/>
<input autocomplete="tel" id="phone" placeholder="(###) ###-####" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="tel"/><br/><br/>
<h3>Address</h3>
<label for="street">Street address</label><br/>
<input autocomplete="street-address" id="street" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="city">City</label><br/>
<input autocomplete="address-level2" id="city" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="zip">ZIP</label><br/>
<input autocomplete="postal-code" id="zip" inputmode="numeric" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<h3>Tree / Material</h3>
<label for="species">Tree species you would like carved</label><br/>
<input id="species" placeholder="e.g., pine, cottonwood, aspen…" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<label for="circumference">Trunk circumference</label><br/>
<input id="circumference" placeholder="e.g., 48 in (or 122 cm)" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;" type="text"/><br/><br/>
<div class="stump-options">
<label style="display:flex; gap:10px; align-items:center;">
<input id="treeDry" type="checkbox"/>
<span>Dry stump (tree was cut years ago and has had time to season).</span>
</label>
<label style="display:flex; gap:10px; align-items:center;">
<input id="treeGreen" type="checkbox"/>
<span>Green stump (a living tree that was freshly cut).</span>
</label>
</div>
<h3>Project description</h3>
<label for="description">Description</label><br/>
<textarea id="description" placeholder="Tell us what you want carved, size, style, deadline, budget range, delivery needs, photos/links, etc." rows="7" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.25); color:#fff;"></textarea><br/><br/>
<!-- Turnstile widget (only visible when Cloudflare is enabled) -->
<div class="cf-turnstile" data-callback="onHuman" data-sitekey="YOUR_TURNSTILE_SITE_KEY" id="turnstileWidget"></div>
<br/>
<button aria-disabled="true" class="side-plank submit-plank" disabled="" id="submitBtn" type="button"><img alt="" class="side-plank-img" src="assets/buttons/plank-button-4.png?v=3"/><span class="side-plank-text">Send Request</span></button>
<p id="formStatus" style="opacity:0.9; margin-top:10px;"></p>
</form>
</div>
<script>
  const useCF = typeof SITE_CONFIG !== "undefined" && SITE_CONFIG.useCloudflare;
  let turnstileToken = "";

  function buildPayload(){
    return {
      firstName: document.getElementById('firstName').value || "",
      lastName: document.getElementById('lastName').value || "",
      phone: document.getElementById('phone').value || "",
      street: document.getElementById('street').value || "",
      city: document.getElementById('city').value || "",
      zip: document.getElementById('zip').value || "",
      species: document.getElementById('species').value || "",
      circumference: document.getElementById('circumference').value || "",
      treeDry: document.getElementById('treeDry').checked,
      treeGreen: document.getElementById('treeGreen').checked,
      description: document.getElementById('description').value || "",
      turnstileToken
    };
  }

  function setStatus(msg, isError=false){
    const el = document.getElementById('formStatus');
    if(!el) return;
    el.textContent = msg;
    el.style.color = isError ? "#ffb3b3" : "#cfe8cf";
  }

  // Turnstile success callback (only called when Cloudflare is enabled)
  function onHuman(token){
    turnstileToken = token || "";
    const btn = document.getElementById('submitBtn');
    if(btn){
      btn.disabled = !turnstileToken;
      btn.setAttribute('aria-disabled', btn.disabled ? 'true' : 'false');
    }
    if(turnstileToken){
      setStatus("Verified. You can send your request now.", false);
    }
  }

  function buildMailtoBody(p){
    return [
      "CONTACT",
      "Name: " + (p.firstName + " " + p.lastName).trim(),
      "Phone: " + p.phone,
      "",
      "ADDRESS",
      "Street: " + p.street,
      "City: " + p.city,
      "ZIP: " + p.zip,
      "",
      "TREE / MATERIAL",
      "Species: " + p.species,
      "Circumference: " + p.circumference,
      "Dry stump: " + (p.treeDry ? "Yes" : "No"),
      "Green stump: " + (p.treeGreen ? "Yes" : "No"),
      "",
      "DESCRIPTION",
      p.description
    ].join("\n");
  }

  async function submitRequest(){
    const btn = document.getElementById('submitBtn');
    const payload = buildPayload();

    // Minimal required fields
    if(!payload.firstName || !payload.lastName || !payload.phone){
      setStatus("Please fill in First name, Last name, and Phone.", true);
      return;
    }
    if(!payload.description){
      setStatus("Please add a short description of what you want carved.", true);
      return;
    }

    if(useCF){
      // Cloudflare mode: POST to serverless function
      if(!turnstileToken){
        setStatus("Please complete the verification first.", true);
        return;
      }
      if(btn) btn.disabled = true;
      setStatus("Sending…", false);

      try{
        const res = await fetch("/api/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json().catch(()=> ({}));
        if(!res.ok || !data.ok){
          throw new Error(data.error || ("Request failed (" + res.status + ")"));
        }
        setStatus("Sent! We'll get back to you soon.", false);
      }catch(err){
        setStatus(String(err.message || err), true);
        if(btn) btn.disabled = false;
      }
    } else {
      // GitHub Pages mode: open mailto link
      var email = (typeof SITE_CONFIG !== "undefined" && SITE_CONFIG.orderEmail)
        || "info@chainandchisel.art";
      var subject = encodeURIComponent("Chain & Chisel Order Request");
      var body = encodeURIComponent(buildMailtoBody(payload));
      window.location.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
      setStatus("Opening your email client…", false);
    }
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    const btn = document.getElementById('submitBtn');
    const instructions = document.getElementById('formInstructions');
    const turnstileWidget = document.getElementById('turnstileWidget');

    if(!useCF){
      // No Cloudflare: hide Turnstile, enable button immediately
      if(turnstileWidget) turnstileWidget.style.display = "none";
      if(btn){
        btn.disabled = false;
        btn.setAttribute('aria-disabled', 'false');
      }
      if(instructions){
        instructions.textContent = "Fill out the request details below and click Send Request to open your email client.";
      }
    } else {
      // Load Turnstile script dynamically
      var s = document.createElement("script");
      s.src = "https://challenges.cloudflare.com/turnstile/v0/api.js";
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    }

    if(btn){
      btn.addEventListener("click", submitRequest);
    }
  });
</script>
</main>
</div>
</main>
</div>
<script defer="" src="site.js"></script>
</body>
</html>
